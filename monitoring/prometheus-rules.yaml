# Monitoring and Alerting Configuration

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    
    scrape_configs:
    - job_name: 'bill-processing-api'
      static_configs:
      - targets: ['bill-processing:8000']
      metrics_path: '/metrics'
    
    - job_name: 'kubernetes-pods'
      kubernetes_sd_configs:
      - role: pod
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
  type: ClusterIP

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      access: proxy
      url: http://prometheus:9090
      isDefault: true

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
  type: LoadBalancer

---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: bill-processing-alerts
  namespace: monitoring
spec:
  groups:
  - name: bill-processing.rules
    interval: 30s
    rules:
    
    # High API latency alert
    - alert: HighAPILatency
      expr: |
        histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: High API latency detected
        description: "P95 latency is {{ $value }}s"
    
    # High error rate alert
    - alert: HighErrorRate
      expr: |
        rate(http_requests_total{status=~"5.."}[5m]) > 0.05
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: High error rate detected
        description: "Error rate is {{ $value }}%"
    
    # Service Bus queue depth
    - alert: HighQueueDepth
      expr: |
        servicebus_queue_length > 1000
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: Service Bus queue depth high
        description: "Queue depth is {{ $value }} messages"
    
    # Document processing failures
    - alert: DocumentProcessingFailures
      expr: |
        rate(documents_processing_failures_total[5m]) > 0.1
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: High document processing failure rate
        description: "Failure rate is {{ $value }}"
    
    # Rule engine low accuracy
    - alert: LowRuleAccuracy
      expr: |
        rule_validation_accuracy < 0.85
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: Rule validation accuracy degraded
        description: "Accuracy is {{ $value }}"
    
    # Database connection issues
    - alert: DatabaseConnectionErrors
      expr: |
        rate(sql_connection_errors_total[5m]) > 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: Database connection errors detected
        description: "Error rate is {{ $value }}"

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: bill-processing
  namespace: monitoring
  labels:
    app: bill-processing
spec:
  selector:
    matchLabels:
      app: bill-processing
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
